name: CIon:  push:    branches: [ main ]  pull_request:permissions:  contents: readjobs:  build-test:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Rust toolchain        uses: dtolnay/rust-toolchain@stable        with:          components: clippy, rustfmt      - name: Cache        uses: Swatinem/rust-cache@v2      - name: Format        run: cargo fmt --all -- --check      - name: Clippy        run: cargo clippy --workspace --all-targets -- -D warnings      - name: Test        run: cargo test --workspace --all-features --quiet