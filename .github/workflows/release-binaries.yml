name: Release Binarieson:  push:    tags:      - "v*.*.*"permissions:  contents: writejobs:  build:    strategy:      fail-fast: false      matrix:        include:          - os: ubuntu-latest            target: x86_64-unknown-linux-gnu            ext: ""            archive: tar.gz          - os: windows-latest            target: x86_64-pc-windows-msvc            ext: .exe            archive: zip          - os: macos-latest            target: x86_64-apple-darwin            ext: ""            archive: tar.gz    runs-on: ${{ matrix.os }}    steps:      - uses: actions/checkout@v4      - name: Rust toolchain        uses: dtolnay/rust-toolchain@stable        with:          targets: ${{ matrix.target }}      - name: Cache        uses: Swatinem/rust-cache@v2      - name: Build server        run: cargo build -p vectradb-server --release --target ${{ matrix.target }}      - name: Prepare artifact        shell: bash        run: |          BIN_NAME=vectradb-server          TARGET_DIR=target/${{ matrix.target }}/release          OUT_DIR=dist          mkdir -p "$OUT_DIR"          cp "$TARGET_DIR/$BIN_NAME${{ matrix.ext }}" "$OUT_DIR/"          # include LICENSE and README if present          [ -f LICENSE ] && cp LICENSE "$OUT_DIR/"          [ -f README.md ] && cp README.md "$OUT_DIR/"          cd "$OUT_DIR"          PKG="${BIN_NAME}-${{ matrix.target }}"          if [ "${{ matrix.archive }}" = "zip" ]; then            7z a "../${PKG}.zip" *          else            tar -czf "../${PKG}.tar.gz" *          fi          cd -      - name: Publish GitHub Release assets        uses: softprops/action-gh-release@v2        with:          files: |            vectradb-server-${{ matrix.target }}.zip            vectradb-server-${{ matrix.target }}.tar.gz        env:          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}